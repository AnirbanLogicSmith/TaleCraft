<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaleCraft — AI Interactive Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #0f0f0f;
      --paper:   #f9f7f4;
      --muted:   #9a9590;
      --rule:    #e8e4df;
      --accent:  #c1440e;
      --accent2: #2a5c8a;
      --seg-bg:  #ffffff;
      --shadow:  0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
    }

    html { font-size: 16px; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--rule);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      position: sticky;
      top: 0;
      background: var(--paper);
      z-index: 100;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -.02em;
      color: var(--ink);
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-size: .85rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      gap: .75rem;
      align-items: center;
    }

    .turn-badge {
      font-family: 'DM Mono', monospace;
      font-size: .75rem;
      color: var(--muted);
      display: none;
    }

    .btn-restart {
      font-family: 'DM Mono', monospace;
      font-size: .75rem;
      padding: .4rem .9rem;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 2px;
      transition: all .2s;
      display: none;
    }

    .btn-restart:hover { border-color: var(--ink); color: var(--ink); }

    /* ── Main layout ── */
    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    /* ── Setup screen ── */
    #setup-screen { animation: fadeUp .5s ease both; }

    .setup-headline {
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: -.02em;
      margin-bottom: .5rem;
    }

    .setup-headline em {
      font-style: italic;
      color: var(--accent);
    }

    .setup-sub {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }

    .genre-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: .5rem;
    }

    .genre-btn {
      padding: .65rem 1rem;
      border: 1px solid var(--rule);
      background: white;
      cursor: pointer;
      border-radius: 3px;
      font-family: 'Cormorant Garamond', serif;
      font-size: .95rem;
      color: var(--ink);
      transition: all .2s;
      text-align: center;
    }

    .genre-btn:hover { border-color: var(--accent); color: var(--accent); }
    .genre-btn.selected {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    textarea {
      width: 100%;
      padding: .9rem 1rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
      background: white;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      color: var(--ink);
      resize: vertical;
      min-height: 90px;
      line-height: 1.6;
      outline: none;
      transition: border-color .2s;
    }

    textarea:focus { border-color: var(--accent2); }
    textarea::placeholder { color: #c8c4be; }

    .btn-begin {
      margin-top: 1rem;
      padding: .85rem 2.5rem;
      background: var(--ink);
      color: white;
      border: none;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: .03em;
      border-radius: 3px;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .btn-begin:hover { background: var(--accent); transform: translateY(-1px); }
    .btn-begin:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── Story screen ── */
    #story-screen { display: none; }

    .story-history { margin-bottom: 2rem; }

    .story-node {
      margin-bottom: 2rem;
      animation: fadeUp .4s ease both;
    }

    .choice-made {
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 1rem;
      padding: .5rem .8rem;
      border-left: 2px solid var(--accent);
      background: #fdf5f2;
    }

    .choice-made::before { content: "↳ "; }

    .segment-card {
      background: var(--seg-bg);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 2rem 2.2rem;
      box-shadow: var(--shadow);
      line-height: 1.8;
      font-size: 1.08rem;
      font-weight: 300;
    }

    .segment-card.current {
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 8px 32px rgba(0,0,0,.08);
    }

    .segment-card p + p { margin-top: 1em; }

    /* ── Choices ── */
    .choices-section {
      margin-top: 2rem;
      animation: fadeUp .4s .1s ease both;
    }

    .choices-label {
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .75rem;
    }

    .choices-list {
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }

    .choice-option {
      padding: .9rem 1.2rem;
      border: 1px solid var(--rule);
      background: white;
      cursor: pointer;
      border-radius: 3px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      color: var(--ink);
      text-align: left;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .choice-option:hover {
      border-color: var(--accent2);
      background: #f2f6fb;
      transform: translateX(4px);
    }

    .choice-option:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .choice-num {
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      color: var(--muted);
      flex-shrink: 0;
      width: 1.2rem;
    }

    /* ── Ending ── */
    .ending-banner {
      margin-top: 2rem;
      padding: 1.5rem 2rem;
      background: linear-gradient(135deg, #fdf5f2 0%, #f2f6fb 100%);
      border: 1px solid var(--rule);
      border-radius: 4px;
      text-align: center;
      animation: fadeUp .5s ease both;
    }

    .ending-banner h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: .3rem;
    }

    .ending-banner p {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 1rem;
    }

    .btn-new {
      padding: .75rem 2rem;
      background: var(--ink);
      color: white;
      border: none;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 3px;
      transition: all .2s;
    }

    .btn-new:hover { background: var(--accent); }

    /* ── Loading ── */
    .loading {
      display: none;
      align-items: center;
      gap: .75rem;
      padding: 1.5rem 0;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: .8rem;
    }

    .loading.visible { display: flex; }

    .dots {
      display: flex;
      gap: 4px;
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce .9s infinite;
    }

    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(.7); opacity: .4; }
      40%           { transform: scale(1);  opacity: 1; }
    }

    /* ── Error ── */
    .error-msg {
      padding: 1rem 1.2rem;
      background: #fff5f5;
      border: 1px solid #ffd0cc;
      border-radius: 3px;
      color: #c1440e;
      font-size: .9rem;
      font-family: 'DM Mono', monospace;
      margin-top: 1rem;
      display: none;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--paper); }
    ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Tale<span>Craft</span></div>
  <div class="tagline">ai interactive fiction</div>
  <div class="header-right">
    <span class="turn-badge" id="turn-badge">turn 1</span>
    <button class="btn-restart" id="btn-restart">↺ restart</button>
  </div>
</header>

<main>

  <!-- ── Setup Screen ── -->
  <div id="setup-screen">
    <h1 class="setup-headline">Every great story<br>needs a <em>spark.</em></h1>
    <p class="setup-sub">Choose your world. AI will do the rest.</p>

    <div class="form-group">
      <label>Genre</label>
      <div class="genre-grid" id="genre-grid">
        <button class="genre-btn" data-genre="Fantasy">Fantasy</button>
        <button class="genre-btn" data-genre="Sci-Fi">Sci-Fi</button>
        <button class="genre-btn" data-genre="Horror">Horror</button>
        <button class="genre-btn" data-genre="Mystery">Mystery</button>
        <button class="genre-btn" data-genre="Romance">Romance</button>
        <button class="genre-btn" data-genre="Thriller">Thriller</button>
        <button class="genre-btn" data-genre="Historical">Historical</button>
        <button class="genre-btn" data-genre="Fairy Tale">Fairy Tale</button>
      </div>
    </div>

    <div class="form-group">
      <label>Opening Premise</label>
      <textarea id="premise-input" placeholder="e.g. A disgraced knight discovers an ancient map hidden in a monastery wall…" rows="3"></textarea>
    </div>

    <div class="error-msg" id="setup-error"></div>

    <button class="btn-begin" id="btn-begin" disabled>
      <span id="begin-text">Begin Story</span>
      <span id="begin-arrow">→</span>
    </button>
  </div>

  <!-- ── Story Screen ── -->
  <div id="story-screen">
    <div class="story-history" id="story-history"></div>

    <div class="loading" id="loading">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <span id="loading-text">crafting your story…</span>
    </div>

    <div id="current-segment"></div>
    <div id="choices-area"></div>
    <div id="ending-area"></div>

    <div class="error-msg" id="story-error"></div>
  </div>

</main>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let selectedGenre = null;
  let storyHistory  = [];   // [{segment, choice}]
  let turn          = 0;

  // ── Elements ──────────────────────────────────────────────────────────────
  const setupScreen    = document.getElementById('setup-screen');
  const storyScreen    = document.getElementById('story-screen');
  const genreGrid      = document.getElementById('genre-grid');
  const premiseInput   = document.getElementById('premise-input');
  const btnBegin       = document.getElementById('btn-begin');
  const beginText      = document.getElementById('begin-text');
  const btnRestart     = document.getElementById('btn-restart');
  const turnBadge      = document.getElementById('turn-badge');
  const storyHistory$  = document.getElementById('story-history');
  const currentSeg     = document.getElementById('current-segment');
  const choicesArea    = document.getElementById('choices-area');
  const endingArea     = document.getElementById('ending-area');
  const loading        = document.getElementById('loading');
  const loadingText    = document.getElementById('loading-text');
  const setupError     = document.getElementById('setup-error');
  const storyError     = document.getElementById('story-error');

  // ── Genre selection ───────────────────────────────────────────────────────
  genreGrid.addEventListener('click', e => {
    const btn = e.target.closest('.genre-btn');
    if (!btn) return;
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedGenre = btn.dataset.genre;
    validateForm();
  });

  premiseInput.addEventListener('input', validateForm);

  function validateForm() {
    btnBegin.disabled = !(selectedGenre && premiseInput.value.trim().length > 10);
  }

  // ── Begin story ───────────────────────────────────────────────────────────
  btnBegin.addEventListener('click', async () => {
    const premise = premiseInput.value.trim();
    if (!selectedGenre || !premise) return;

    setupError.style.display = 'none';
    btnBegin.disabled = true;
    beginText.textContent = 'Starting…';

    try {
      const res  = await fetch('/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ genre: selectedGenre, premise }),
      });

      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();

      // Switch screens
      setupScreen.style.display = 'none';
      storyScreen.style.display = 'block';
      btnRestart.style.display = 'block';
      turnBadge.style.display = 'block';

      storyHistory = [];
      turn = 1;
      renderSegment(data);

    } catch (err) {
      setupError.textContent = '⚠ ' + (err.message || 'Something went wrong. Check your API key.');
      setupError.style.display = 'block';
      btnBegin.disabled = false;
      beginText.textContent = 'Begin Story';
    }
  });

  // ── Choose ────────────────────────────────────────────────────────────────
  async function makeChoice(choice, currentSegmentText) {
    // Archive current segment to history
    storyHistory.push({ segment: currentSegmentText, choice });

    // Render archived segment
    const node = document.createElement('div');
    node.className = 'story-node';
    node.innerHTML = `
      <div class="choice-made">${escHtml(choice)}</div>
      <div class="segment-card">${formatSegment(currentSegmentText)}</div>
    `;
    storyHistory$.appendChild(node);

    // Clear active area
    currentSeg.innerHTML = '';
    choicesArea.innerHTML = '';
    endingArea.innerHTML = '';
    storyError.style.display = 'none';

    // Show loading
    loading.classList.add('visible');
    loadingText.textContent = 'weaving the next thread…';
    turn++;
    turnBadge.textContent = `turn ${turn}`;

    // Disable all choice buttons
    document.querySelectorAll('.choice-option').forEach(b => b.disabled = true);

    try {
      const res = await fetch('/api/continue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          genre: selectedGenre,
          history: storyHistory,
          choice,
        }),
      });

      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();

      loading.classList.remove('visible');
      renderSegment(data);

      // Smooth scroll to new segment
      setTimeout(() => {
        currentSeg.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);

    } catch (err) {
      loading.classList.remove('visible');
      storyError.textContent = '⚠ ' + (err.message || 'Something went wrong. Try again.');
      storyError.style.display = 'block';
    }
  }

  // ── Render segment ────────────────────────────────────────────────────────
  // Store current segment text so choice handlers can reference it safely
  let currentSegmentText = '';

  function renderSegment(data) {
    currentSegmentText = data.segment;

    currentSeg.innerHTML = `
      <div class="segment-card current">
        ${formatSegment(data.segment)}
      </div>
    `;

    if (data.is_ending || !data.choices || data.choices.length === 0) {
      endingArea.innerHTML = `
        <div class="ending-banner">
          <h3>The End</h3>
          <p>Your story is complete. Every choice shaped this fate.</p>
          <button class="btn-new" id="btn-new-story">Forge a New Story</button>
        </div>
      `;
      document.getElementById('btn-new-story').addEventListener('click', restartStory);
    } else {
      // Build choices using DOM API — no inline onclick, no escaping issues
      const nums = ['I', 'II', 'III'];
      choicesArea.innerHTML = '<div class="choices-section"><div class="choices-label">What happens next?</div><div class="choices-list" id="choices-list"></div></div>';
      const list = document.getElementById('choices-list');
      data.choices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-option';
        btn.innerHTML = `<span class="choice-num">${nums[i] || (i + 1)}</span><span>${escHtml(c)}</span>`;
        btn.addEventListener('click', () => makeChoice(c, currentSegmentText));
        list.appendChild(btn);
      });
    }
  }

  // ── Restart ───────────────────────────────────────────────────────────────
  function restartStory() {
    storyScreen.style.display = 'none';
    setupScreen.style.display = 'block';
    btnRestart.style.display = 'none';
    turnBadge.style.display = 'none';
    storyHistory$.innerHTML = '';
    currentSeg.innerHTML = '';
    choicesArea.innerHTML = '';
    endingArea.innerHTML = '';
    storyError.style.display = 'none';
    storyHistory = [];
    turn = 0;
    // Reset form
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('selected'));
    premiseInput.value = '';
    selectedGenre = null;
    btnBegin.disabled = true;
    beginText.textContent = 'Begin Story';
  }

  btnRestart.addEventListener('click', restartStory);

  // ── Utils ─────────────────────────────────────────────────────────────────
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(s) {
    // Used inside JSON.stringify so double-quotes don't matter, but keep it clean
    return s.replace(/'/g, "\\'");
  }

  function formatSegment(text) {
    return text.split(/\n\n+/).map(p => `<p>${escHtml(p.trim())}</p>`).join('');
  }
</script>
</body>
</html>
